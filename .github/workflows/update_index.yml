name: Update Workshop Global Index

on:
  push:
    paths:
      - 'patches/**/*.json'
      - '!patches/index.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Generate index.json
      run: |
        node -e '
        const fs = require("fs");
        const path = require("path");
        const patchesDir = path.join(process.cwd(), "patches");
        if (!fs.existsSync(patchesDir)) {
          fs.mkdirSync(patchesDir, { recursive: true });
          fs.writeFileSync(path.join(patchesDir, "index.json"), "[]");
          process.exit(0);
        }
        const listAllJsonFiles = (dir, filesList = []) => {
          const files = fs.readdirSync(dir);
          for (const file of files) {
            const filePath = path.join(dir, file);
            const stat = fs.statSync(filePath);
            if (stat.isDirectory()) {
              listAllJsonFiles(filePath, filesList);
            } else if (file.endsWith(".json") && file !== "index.json") {
              filesList.push(filePath);
            }
          }
          return filesList;
        };
        const jsonFiles = listAllJsonFiles(patchesDir);
        const indexData = [];
        for (const file of jsonFiles) {
          try {
            const parsed = JSON.parse(fs.readFileSync(file, "utf8"));
            const relativePath = path.relative(process.cwd(), file).replace(/\\/g, "/");
            indexData.push({ ...parsed, metaPath: relativePath });
          } catch(e) { console.error("skip:", file, e.message); }
        }
        indexData.sort((a, b) => new Date(b.createdTime || 0) - new Date(a.createdTime || 0));
        const indexPath = path.join(patchesDir, "index.json");
        fs.writeFileSync(indexPath, JSON.stringify(indexData, null, 2));
        console.log("Generated index with", indexData.length, "actions.");
        '

    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add patches/index.json
        git diff-index --quiet HEAD || git commit -m "chore: auto-update workshop index [skip ci]"
        git push
